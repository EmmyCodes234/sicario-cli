# Example: Add Sicario SAST scanning to your CI pipeline.
# Copy this file to .github/workflows/sicario-scan.yml and adjust as needed.
#
# Usage: uses: EmmyCodes234/sicario-cli@v1
#
# For more information, see the action.yml at the repository root.

name: Sicario Security Scan

on:
  pull_request:
  push:
    branches: [main]

permissions:
  security-events: write  # Required for SARIF upload to Code Scanning
  contents: read

jobs:
  sicario:
    name: SAST Scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0  # Full history needed for diff-aware scanning

      # ── Full scan on push to main ────────────────────────────────────────
      - name: Sicario Scan (full)
        if: github.event_name == 'push'
        uses: EmmyCodes234/sicario-cli@v1
        with:
          severity-threshold: low
          format: sarif

      # ── Diff scan on pull requests ───────────────────────────────────────
      - name: Sicario Scan (diff)
        if: github.event_name == 'pull_request'
        uses: EmmyCodes234/sicario-cli@v1
        with:
          severity-threshold: medium
          diff-base: origin/${{ github.base_ref }}
          format: sarif
