name: Zigbuild Release

# Produces an optimised, fully static release binary for:
#   • x86_64-unknown-linux-musl  – static Linux binary (runs on any Linux distro)
#
# This target is cross-compiled from ubuntu-latest using cargo-zigbuild,
# which routes C/C++ compilation of vendored dependencies through Zig's
# bundled clang toolchain so no host SDK is required.
#
# macOS binaries (aarch64 + x86_64) are handled by the existing cargo-dist
# release.yml workflow which runs on native macOS runners.
#
# This workflow runs in parallel with release.yml and uploads its artifact
# to the same GitHub Release.

on:
  push:
    tags:
      - 'v[0-9]+.[0-9]+.[0-9]+*'

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  build:
    name: build (x86_64-unknown-linux-musl)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      # ── Rust toolchain ───────────────────────────────────────────────────────
      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-unknown-linux-musl

      # ── Zig compiler ─────────────────────────────────────────────────────────
      - name: Install Zig
        uses: goto-bus-stop/setup-zig@v2
        with:
          version: "0.13.0"

      # ── cargo-zigbuild ───────────────────────────────────────────────────────
      - name: Install cargo-zigbuild
        run: cargo install cargo-zigbuild --version "0.19.3" --locked

      # ── Rust build cache ─────────────────────────────────────────────────────
      - name: Cache Cargo registry + build artefacts
        uses: swatinem/rust-cache@v2
        with:
          key: zigbuild-x86_64-unknown-linux-musl

      # ── Build ────────────────────────────────────────────────────────────────
      # --features vendored-libs disables the D-Bus keyring backend so the
      # binary has zero dynamic library dependencies on Linux.
      - name: Build release binary
        run: |
          cargo zigbuild \
            --release \
            --target x86_64-unknown-linux-musl \
            --features vendored-libs \
            -p sicario-cli

      # ── Strip + package ──────────────────────────────────────────────────────
      - name: Strip binary
        run: strip target/x86_64-unknown-linux-musl/release/sicario

      - name: Package binary into tarball
        run: |
          tar -czf sicario-x86_64-linux-musl.tar.gz \
            -C target/x86_64-unknown-linux-musl/release sicario

      # ── SHA-256 checksum ─────────────────────────────────────────────────────
      - name: Generate SHA-256 checksum
        run: sha256sum sicario-x86_64-linux-musl.tar.gz > sicario-x86_64-linux-musl.tar.gz.sha256

      # ── Upload to GitHub Release ─────────────────────────────────────────────
      - name: Upload to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          files: |
            sicario-x86_64-linux-musl.tar.gz
            sicario-x86_64-linux-musl.tar.gz.sha256
          generate_release_notes: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
